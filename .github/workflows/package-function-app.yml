name: Package function app

# Builds a ready-to-run deployment package and commits it to dist/function-app.zip.
# infra/main.bicep points WEBSITE_RUN_FROM_PACKAGE at this file's raw.githubusercontent.com
# URL by default, so deploying the template also deploys this build. A stable, direct URL
# is required here: GitHub Releases redirect to a short-lived signed CDN link, which
# Azure's remote-package loader on Linux Consumption fails to fetch.
#
# Requires Settings -> Actions -> General -> Workflow permissions -> "Read and
# write permissions", so this workflow can commit the built package back to the repo.

on:
  push:
    branches: [main]
    paths:
      - PerceptionPointSentinelConnector/**
      - host.json
      - requirements.txt
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # .python_packages/lib/site-packages is on sys.path for apps running
      # from WEBSITE_RUN_FROM_PACKAGE (no remote build happens there).
      - name: Install dependencies into the deployment package
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Build function-app.zip
        run: |
          zip -r function-app.zip \
            host.json requirements.txt PerceptionPointSentinelConnector .python_packages \
            -x '*__pycache__*' -x '*.pyc'

      - name: Commit dist/function-app.zip
        run: |
          mkdir -p dist
          mv function-app.zip dist/function-app.zip
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/function-app.zip
          git diff --staged --quiet || git commit -m "Rebuild dist/function-app.zip"
          git pull --rebase origin main
          git push
